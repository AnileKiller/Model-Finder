name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Restore TFLite models from GitHub Secrets ────────────────────────
      # Each model is stored as a Base64-encoded secret.
      # Run: base64 -w 0 <model_file.tflite> and paste the output as a secret.
      #
      # Required secrets:
      #   BLAZE_FACE_MODEL       — blaze_face_short_range.tflite
      #   FACE_MESH_MODEL        — facemesh_lite_468_2022_09_06.f16.tflite
      #   FACE_SEGMENTATION_MODEL— face_segmentation_xenoformer_xs_2024_04_02.int8.tflite

      - name: Restore TFLite models from secrets
        env:
          BLAZE_FACE_MODEL: ${{ secrets.BLAZE_FACE_MODEL }}
          FACE_MESH_MODEL: ${{ secrets.FACE_MESH_MODEL }}
          FACE_SEGMENTATION_MODEL: ${{ secrets.FACE_SEGMENTATION_MODEL }}
        run: |
          mkdir -p app/src/main/assets/models

          if [ -n "$BLAZE_FACE_MODEL" ]; then
            echo "$BLAZE_FACE_MODEL" | base64 --decode \
              > app/src/main/assets/models/blaze_face_short_range.tflite
            echo "BlazeFace model restored ($(wc -c < app/src/main/assets/models/blaze_face_short_range.tflite) bytes)"
          else
            echo "⚠️  BLAZE_FACE_MODEL secret not set — build will succeed but app won't run without the model file."
          fi

          if [ -n "$FACE_MESH_MODEL" ]; then
            echo "$FACE_MESH_MODEL" | base64 --decode \
              > "app/src/main/assets/models/facemesh_lite_468_2022_09_06.f16.tflite"
            echo "FaceMesh model restored"
          else
            echo "⚠️  FACE_MESH_MODEL secret not set."
          fi

          if [ -n "$FACE_SEGMENTATION_MODEL" ]; then
            echo "$FACE_SEGMENTATION_MODEL" | base64 --decode \
              > "app/src/main/assets/models/face_segmentation_xenoformer_xs_2024_04_02.int8.tflite"
            echo "Segmentation model restored"
          else
            echo "⚠️  FACE_SEGMENTATION_MODEL secret not set."
          fi

      # ── Generate gradle-wrapper.jar ─────────────────────────────────────
      # The binary jar is not committed to the repo. Install Gradle CLI and
      # regenerate the wrapper so that subsequent ./gradlew calls work.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  release:
    name: Build Release APK (signed)
    runs-on: ubuntu-latest
    # Only run on pushes to main/master, not on PRs
    if: github.event_name == 'push'
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore TFLite models from secrets
        env:
          BLAZE_FACE_MODEL: ${{ secrets.BLAZE_FACE_MODEL }}
          FACE_MESH_MODEL: ${{ secrets.FACE_MESH_MODEL }}
          FACE_SEGMENTATION_MODEL: ${{ secrets.FACE_SEGMENTATION_MODEL }}
        run: |
          mkdir -p app/src/main/assets/models
          [ -n "$BLAZE_FACE_MODEL" ] && echo "$BLAZE_FACE_MODEL" | base64 --decode \
            > app/src/main/assets/models/blaze_face_short_range.tflite
          [ -n "$FACE_MESH_MODEL" ] && echo "$FACE_MESH_MODEL" | base64 --decode \
            > "app/src/main/assets/models/facemesh_lite_468_2022_09_06.f16.tflite"
          [ -n "$FACE_SEGMENTATION_MODEL" ] && echo "$FACE_SEGMENTATION_MODEL" | base64 --decode \
            > "app/src/main/assets/models/face_segmentation_xenoformer_xs_2024_04_02.int8.tflite"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── Optional: sign the release APK ───────────────────────────────────
      # Set the following secrets to enable APK signing:
      #   KEYSTORE_BASE64   — base64-encoded .jks / .keystore file
      #   KEY_STORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD

      - name: Sign release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
